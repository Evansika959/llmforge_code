# Search space tailored for seeding NSGA from Qwen3-0.6B.
#
# Step grid chosen so Qwen3-0.6B's canonical dims land exactly on a step:
#   n_embd=1024 (=768+4*64), block_size=512, n_head=16, n_kv_group=8,
#   mlp_size=3072 (=6*512), n_qk_head_dim=128 (=4*32), n_v_head_dim=128,
#   attention_variant=infinite.

global_spec:
  n_embd:
    type: int
    low: 768
    high: 1536
    step: 64
  block_size:
    type: int
    low: 512
    high: 512
    step: 128
  use_concat_heads:
    type: cat
    choices:
      - true

layer_spec:
  n_head:
    type: int
    low: 1
    high: 16
    step: 1
  n_kv_group:
    type: int
    low: 1
    high: 16
    step: 1
  mlp_size:
    type: int
    low: 512
    high: 4608
    step: 512
  n_qk_head_dim:
    type: int
    low: 32
    high: 192
    step: 32
  n_v_head_dim:
    type: int
    low: 32
    high: 192
    step: 32
  n_cproj:
    type: int
    low: 1
    high: 1
    step: 1
  attention_variant:
    type: cat
    choices:
      - infinite
      - identity
