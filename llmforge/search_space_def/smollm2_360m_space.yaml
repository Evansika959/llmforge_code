# Search space tailored for seeding NSGA from SmolLM2-360M.
#
# Step grid chosen so SmolLM2-360M's canonical dims land exactly on a step:
#   n_embd=960 (=640+5*64), block_size=512, n_head=15, n_kv_group=5,
#   mlp_size=2560 (=5*512), n_qk_head_dim=64 (=2*32), n_v_head_dim=64,
#   attention_variant=infinite.

global_spec:
  n_embd:
    type: int
    low: 640
    high: 1280
    step: 64
  block_size:
    type: int
    low: 512
    high: 512
    step: 128
  use_concat_heads:
    type: cat
    choices:
      - true

layer_spec:
  n_head:
    type: int
    low: 1
    high: 15
    step: 1
  n_kv_group:
    type: int
    low: 1
    high: 15
    step: 1
  mlp_size:
    type: int
    low: 512
    high: 4096
    step: 512
  n_qk_head_dim:
    type: int
    low: 32
    high: 192
    step: 32
  n_v_head_dim:
    type: int
    low: 32
    high: 192
    step: 32
  n_cproj:
    type: int
    low: 1
    high: 1
    step: 1
  attention_variant:
    type: cat
    choices:
      - infinite
      - identity
