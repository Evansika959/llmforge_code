constraints:
  # DXE constraints — forced spatial factors on the DXT/VAC/mac_lane mesh.
  #
  # Updated 2026-05-01: weights now flow through DRAM like every other
  # dataspace (was previously `bypass: [Weights]` modeling a hypothetical
  # 3MB-WMEM scale where all layer weights fit on-chip; that assumption
  # doesn't hold for the 100M+ param baselines we benchmark, so we model
  # weights via DRAM to match real silicon at this parameter scale).
  #
  # Spatial utilization:
  #   DXT meshX=8:      D=8  (8 output-channel groups)
  #   VAC meshY=16:     D=16 (16 output channels per DXT)
  #   mac_lane meshX=16: E=16 (16-wide reduction)
  #   Total: D=128, E=16 → 2048 MACs
  version: 0.4
  targets:
    # DRAM: keep all three dataspaces (Weights flow through DRAM same as
    # Inputs/Outputs — model parameters too large to fit in WMEM at scale).
    - target: DRAM
      type: dataspace
      keep: [Inputs, Outputs, Weights]
    - target: DRAM
      type: temporal
      permutation: [E, D, L]
    - target: global_sram
      type: temporal
      permutation: [L, E, D]
    - target: head_sram
      type: temporal
      permutation: [E, D, L]
    # Force full spatial utilization
    - target: DXT
      type: spatial
      factors: [N=1, E=1, L=1, R=1, S=1, Q=1, D=8]
    - target: VAC
      type: spatial
      factors: [N=1, E=1, L=1, Q=1, R=1, S=1, D=16]
    - target: mac_lane
      type: spatial
      factors: [N=1, D=1, L=1, R=1, S=1, Q=1, E=16]
