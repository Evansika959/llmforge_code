# Qwen-2.5-0.5B reference architecture, mapped into the IHA (Infinite
# Heterogeneous Attention) Individual format used by NSGA search.
#
# Source of truth: Qwen/Qwen2.5-0.5B/config.json
#   hidden_size              = 896
#   num_hidden_layers        = 24
#   num_attention_heads      = 14
#   num_key_value_heads      = 2          (GQA 7:1)
#   head_dim                 = 64         (= 896 / 14)
#   intermediate_size        = 4864
#   hidden_act               = silu       (SwiGLU-style gated MLP)
#   tie_word_embeddings      = true
#   max_position_embeddings  = 32768      (inference ctx; training ctx below)
#   vocab_size               = 151936
#
# Mapping -> IHA fields:
#   hidden_size          -> n_embd
#   num_attention_heads  -> n_head
#   num_key_value_heads  -> n_kv_group
#   head_dim             -> n_qk_head_dim = n_v_head_dim
#   intermediate_size    -> mlp_size
#   (Qwen MHA + SwiGLU)  -> attention_variant: "infinite",
#                           mlp_variant default (SwiGLU)
#
# block_size here is the measurement context length used by HW evaluators,
# independent of HF's max_position_embeddings.

name: Qwen-2.5-0.5B

n_embd: 896
block_size: 512
use_concat_heads: true

n_layers: 24
layer_template:
  n_head: 14
  n_kv_group: 2        # GQA 7:1 (14 query heads share 2 KV heads)
  n_qk_head_dim: 64
  n_v_head_dim: 64
  mlp_size: 4864
  n_cproj: 1
  attention_variant: infinite

# val_loss = 2.821 (FineWeb-Edu-10BT, Table 3)
