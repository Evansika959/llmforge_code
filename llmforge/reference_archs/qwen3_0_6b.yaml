# Qwen3-0.6B reference architecture, mapped into the IHA Individual format.
#
# Source of truth: Qwen/Qwen3-0.6B config.json
#   hidden_size             = 1024
#   num_hidden_layers       = 28
#   num_attention_heads     = 16
#   num_key_value_heads     = 8          (GQA 2:1)
#   intermediate_size       = 3072
#   head_dim                = 128        (decoupled from hidden/num_heads)
#   hidden_act              = silu       (SwiGLU-style gated MLP)
#   tie_word_embeddings     = true
#   max_position_embeddings = 40960      (inference ctx; training ctx below)
#
# Mapping -> IHA fields:
#   hidden_size          -> n_embd
#   num_attention_heads  -> n_head
#   num_key_value_heads  -> n_kv_group
#   head_dim             -> n_qk_head_dim = n_v_head_dim
#   intermediate_size    -> mlp_size
#   (Qwen MHA)           -> attention_variant: "infinite"
#
# block_size here is the NSGA training context length, independent of
# HF max_position_embeddings.

name: Qwen3-0.6B

n_embd: 1024
block_size: 512
use_concat_heads: true

n_layers: 28
layer_template:
  n_head: 16
  n_kv_group: 8
  n_qk_head_dim: 128
  n_v_head_dim: 128
  mlp_size: 3072
  n_cproj: 1
  attention_variant: infinite
