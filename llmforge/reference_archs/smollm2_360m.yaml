# SmolLM2-360M reference architecture, mapped into the IHA (Infinite
# Heterogeneous Attention) Individual format used by NSGA search.
#
# Source of truth: HuggingFaceTB/SmolLM2-360M/config.json
#   hidden_size           = 960
#   num_hidden_layers     = 32
#   num_attention_heads   = 15
#   num_key_value_heads   = 5          (GQA 3:1)
#   intermediate_size     = 2560
#   head_dim              = 64         (= 960 / 15)
#   hidden_act            = silu       (SwiGLU-style gated MLP)
#   tie_word_embeddings   = true
#   max_position_embeddings = 8192     (inference ctx; training ctx is set below)
#
# Mapping -> IHA fields:
#   hidden_size          -> n_embd
#   num_attention_heads  -> n_head
#   num_key_value_heads  -> n_kv_group
#   head_dim             -> n_qk_head_dim = n_v_head_dim
#   intermediate_size    -> mlp_size
#   (Llama MHA)          -> attention_variant: "infinite"  (IHA closest variant)
#
# block_size here is the NSGA training context length, independent of
# HF max_position_embeddings.

name: SmolLM2-360M

n_embd: 960
block_size: 512
use_concat_heads: true

# All 32 layers are homogeneous per the HF config. The seeding script
# expands `layer_template` n_layers times. Replace with an explicit
# `layers:` list to represent a heterogeneous reference.
n_layers: 32
layer_template:
  n_head: 15
  n_kv_group: 5
  n_qk_head_dim: 64
  n_v_head_dim: 64
  mlp_size: 2560
  n_cproj: 1
  attention_variant: infinite
