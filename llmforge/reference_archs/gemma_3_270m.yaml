# Gemma 3 270M reference architecture, mapped into the IHA (Infinite
# Heterogeneous Attention) Individual format used by NSGA search.
#
# Source of truth: google/gemma-3-270m/config.json
#   hidden_size              = 640
#   num_hidden_layers        = 18
#   num_attention_heads      = 4
#   num_key_value_heads      = 1          (MQA, 4:1)
#   head_dim                 = 256         (decoupled: 640/4 = 160 != 256)
#   intermediate_size        = 2048
#   hidden_activation        = gelu_pytorch_tanh   (gated GeLU = GeGLU,
#                                                  3-matrix MLP)
#   tie_word_embeddings      = true
#   max_position_embeddings  = 32768       (inference ctx; training ctx below)
#
# Mapping -> IHA fields:
#   hidden_size          -> n_embd
#   num_attention_heads  -> n_head
#   num_key_value_heads  -> n_kv_group
#   head_dim             -> n_qk_head_dim = n_v_head_dim
#   intermediate_size    -> mlp_size
#   GeGLU (3-matrix gated) -> closest IHA mapping is the SwiGLU default
#       (3-matrix gated). The activation function differs (GeLU-tanh vs
#       SiLU) but the parameter count and dataflow match.
#
# Note: Gemma 3's head_dim=256 with n_embd=640 is a non-standard
# decoupled head dimension (the n_h * d_h product is 1024 != 640). IHA
# maps this directly via independent n_qk_head_dim/n_v_head_dim fields.
#
# block_size here is the measurement context length used by HW evaluators,
# not Gemma's max_position_embeddings.

name: Gemma-3-270M

n_embd: 640
block_size: 512
use_concat_heads: true

n_layers: 18
layer_template:
  n_head: 4
  n_kv_group: 1        # MQA: a single KV group shared across all 4 query heads
  n_qk_head_dim: 256
  n_v_head_dim: 256
  mlp_size: 2048
  n_cproj: 1
  attention_variant: infinite

# val_loss = 3.030 (FineWeb-Edu-10BT, Table 3, "Gemma-270M-style")
