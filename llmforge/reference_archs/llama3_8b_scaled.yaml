# LLaMA-3 8B (scaled down) — reference architecture, mapped into the IHA
# layout used by NSGA search.
#
# Source of truth (original): meta-llama/Meta-Llama-3-8B/config.json
#   hidden_size             = 4096
#   num_hidden_layers       = 32
#   num_attention_heads     = 32
#   num_key_value_heads     = 8         (GQA 4:1)
#   intermediate_size       = 14336
#   head_dim                = 128
#   hidden_act              = silu      (SwiGLU MLP)
#
# Scaled-down mapping principles:
#   1. Keep n_embd = 768 to match the cosearch search space.
#   2. Keep GQA ratio exactly: 12:3 = 4:1 (matches original 32:8 = 4:1).
#   3. Keep MLP ratio close (2560 / 768 ≈ 3.33×, original 14336 / 4096 = 3.5×).
#
# Resulting scaled config (from the user's mapping table):
#   n_embd=768, n_layer=30, n_head=12, n_kv_group=3, head_dim=64,
#   mlp_size=2560, block_size=1024 → ~200.8 M params, val_loss=2.7649
#
# LLaMA-3 uses SwiGLU MLPs; we inherit the build's `mlp_variant="swiglu"`
# default (no override field needed).

name: LLaMA-3-8B-scaled

n_embd: 768
block_size: 1024
use_concat_heads: true

n_layers: 30
layer_template:
  n_head: 12
  n_kv_group: 3          # 12:3 = 4:1 (matches original LLaMA-3 8B 32:8 = 4:1)
  n_qk_head_dim: 64
  n_v_head_dim: 64
  mlp_size: 2560         # 3.33× n_embd, mirrors original 3.5× ratio
  n_cproj: 1
  attention_variant: infinite
